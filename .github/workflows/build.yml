name: Build Windows EXE + PAF

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow python-docx pyinstaller

      - name: Generate icon
        run: python generate_icon.py

      - name: Build main EXE (PyInstaller)
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name "QA_Screenshot_Tool" `
            --icon=icon.ico `
            --add-data "icon.ico;." `
            --hidden-import=PIL `
            --hidden-import=PIL.ImageGrab `
            --noupx `
            --clean `
            qa_tool.py

      - name: Compile PortableApps launcher (GCC)
        shell: cmd
        run: |
          C:\Strawberry\c\bin\gcc.exe launcher\launcher.c -o dist\QAScreenshotToolPortable.exe -mwindows -luser32 -lkernel32 -O2 -s

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build PAF installer (NSIS)
        shell: cmd
        run: |
          makensis installer.nsi

      - name: Upload plain EXE
        uses: actions/upload-artifact@v4
        with:
          name: QA_Screenshot_Tool_EXE
          path: dist/QA_Screenshot_Tool.exe
          retention-days: 30

      - name: Upload PortableApps PAF installer
        uses: actions/upload-artifact@v4
        with:
          name: QA_Screenshot_Tool_PAF
          path: QAScreenshotToolPortable_1.0.paf.exe
          retention-days: 30
